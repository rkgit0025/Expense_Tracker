<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f2744" />
    <title>SED Expense Tracker</title>

    <!-- DNS prefetch for Google Fonts CDN (faster font loading) -->
    <link rel="dns-prefetch"    href="//fonts.googleapis.com" />
    <link rel="dns-prefetch"    href="//fonts.gstatic.com" />
    <link rel="preconnect"      href="https://fonts.googleapis.com" />
    <link rel="preconnect"      href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts — loaded after render via media trick to avoid render-blocking -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <!-- Fallback for no-JS -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" />
    </noscript>
  </head>
  <body>
    <!-- Inline critical CSS — prevents flash of unstyled content -->
    <style>
      html, body { margin: 0; padding: 0; font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; }
      #root { min-height: 100vh; }
      /* Login page skeleton prevents layout shift */
      .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
